name: basictest_wincmake

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: src

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: CMake cfg NCrystal
      shell: cmd
      run: cmake -B build . -DNCRYSTAL_ENABLE_TESTING=ON

    - name: CMake build NCrystal
      shell: cmd
      run: cmake --build build --config Release

    - name: CMake build NCrystal
      shell: cmd
      run: |
        cd build
        ctest
