name: basictest_wincmake

on:
  push:
  pull_request:

jobs:
  build:
    # More platform information available on:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
    #
    # Sep-2024: windows-latest is windows-2022. We should also try to make
    # windows-2019 work, and try to build with clang/gcc on. And add a
    # conda-based test.

    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: src

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: pip install extra deps
      shell: cmd
      run: |
        python -mpip install numpy
        python -c "import numpy"

    - name: CMake cfg NCrystal
      shell: cmd
      #FIXME: Using -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON right now to make tests
      #       with private headers work on windows. We need to make this
      #       automatic, but prevent it from being used to actually produce
      #       pip/conda packages (unless we want them to support advanced plugins?).
      #       We might also need to make NCRYSTAL_API a noop in that case, to
      #       get rid of warnings about duplicate dllexport.
      run: >
        cmake -B build src
        -DNCRYSTAL_ENABLE_TESTING=ON
        -DNCRYSTAL_ENABLE_EXAMPLES=ON
        -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
        -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON
        -DMCTOOLS_REQUIRE_ALL_TEST_DEPS=ON

    - name: CMake build NCrystal
      shell: cmd
      run: cmake --build build --config Release
      #NB: More verbosity by appending: "-- /verbosity:detailed"

    - name: Run CTests
      shell: cmd
      run: |
        cd build
        ctest --build-config Release --output-on-failure --test-output-size-failed 100000 --test-output-truncation middle
      #NB more verbosity by appending: "-VV"

    - name: CMake install NCrystal
      shell: cmd
      run: cmake --build build --target INSTALL --config Release
      #NB: More verbosity by appending: "-- /verbosity:detailed"
