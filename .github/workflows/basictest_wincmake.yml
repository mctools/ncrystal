name: basictest_wincmake

on:
  push:
  pull_request:

jobs:
  build:
    #C:\Program Files\Microsoft Visual Studio\2022\Enterprise

    #TODO: Also windows-2019, windows-2022(==latest?). Also try to build with clang/gcc on
    #windows?
    #https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
    #Also add a conda-based test.
    runs-on: windows-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: src

    - name: Setup python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: ldd help
      shell: cmd
      run: help ldd

    - name: CMake cfg NCrystal
      shell: cmd
      run: cmake -B build src -DNCRYSTAL_ENABLE_TESTING=ON -DNCRYSTAL_ENABLE_EXAMPLES=ON -DCMAKE_COMPILE_WARNING_AS_ERROR=ON  -DCMAKE_WINDOWS_EXPORT_ALL_SYMBOLS=ON

#    - name: Look around
#      shell: cmd
#      run: |
#        tree /f build

    - name: CMake build NCrystal
      shell: cmd
      run: cmake --build build --config Release
      #NB: More verbosity by appending: "-- /verbosity:detailed"

#    - name: Look around again
#      shell: cmd
#      run: |
#        tree /f build

    - name: Run CTests
      shell: cmd
      run: |
        cd build
        ctest --build-config Release -VV --output-on-failure --test-output-size-failed 100000 --test-output-truncation middle
      #NB more verbosity by appending: --verbose --extra-verbose

    - name: CMake install NCrystal
      shell: cmd
      run: cmake --build build --target INSTALL --config Release  -- /verbosity:detailed
      #NB: More verbosity by appending: "-- /verbosity:detailed"
